name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Run tests - Rust (${{ matrix.rust }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: stable, os: ubuntu-22.04 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt
      - name: Extract metadata
        id: meta
        run: |
          FEATURES_EXCEPT_FAST_CHECK=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "gqlrs") | .features | keys | map(select(. != "fast-check")) | join(",")')
          FEATURES_EXCEPT_BOXED_TRAIT_AND_FAST_CHECK=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "gqlrs") | .features | keys | map(select(. != "boxed-trait" and . != "fast-check")) | join(",")')
          echo "features_except_fast_check=$FEATURES_EXCEPT_FAST_CHECK" >> "$GITHUB_OUTPUT"
          echo "features=$FEATURES_EXCEPT_BOXED_TRAIT_AND_FAST_CHECK" >> "$GITHUB_OUTPUT"
      - name: Build with all runtime features
        run: cargo build --features ${{ steps.meta.outputs.features_except_fast_check }}
      - name: Check fast-check feature
        run: cargo check --features fast-check,boxed-trait
      - name: Build with all runtime features except boxed-trait
        run: cargo build --features ${{ steps.meta.outputs.features }}
      - name: Build
        run: cargo build --workspace --verbose
      - name: Run tests
        run: cargo test --workspace --features ${{ steps.meta.outputs.features }}
      - name: Clean
        run: cargo clean

  tests_min_compat:
    name: Run min rust version tests - Rust (${{ matrix.rust }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: 1.89.0, os: ubuntu-22.04 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt
      - name: Extract metadata
        id: meta
        run: |
          FEATURES_EXCEPT_FAST_CHECK=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "gqlrs") | .features | keys | map(select(. != "fast-check")) | join(",")')
          FEATURES_EXCEPT_BOXED_TRAIT_AND_FAST_CHECK=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "gqlrs") | .features | keys | map(select(. != "boxed-trait" and . != "fast-check")) | join(",")')
          echo "features_except_fast_check=$FEATURES_EXCEPT_FAST_CHECK" >> "$GITHUB_OUTPUT"
          echo "features=$FEATURES_EXCEPT_BOXED_TRAIT_AND_FAST_CHECK" >> "$GITHUB_OUTPUT"
      - name: Build with all runtime features
        run: cargo build --features ${{ steps.meta.outputs.features_except_fast_check }}
      - name: Check fast-check feature
        run: cargo check --features fast-check,boxed-trait
      - name: Build with all runtime features except boxed-trait
        run: cargo build --features ${{ steps.meta.outputs.features }}
      - name: Build
        run: cargo build --workspace --verbose
      - name: Run tests
        run: cargo test --workspace --features ${{ steps.meta.outputs.features }}
      - name: Clean
        run: cargo clean

  rustfmt:
    name: Run rustfmt - Rust (${{ matrix.rust }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: nightly-2025-04-09, os: ubuntu-22.04 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt
      - name: Check format
        run: cargo +${{ matrix.rust }} fmt --all -- --check
      - name: Check examples availability
        id: examples
        run: |
          if [ -f examples/Cargo.toml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "examples/Cargo.toml is not present; skipping examples format check"
          fi
      - name: Check examples format
        if: steps.examples.outputs.available == 'true'
        working-directory: ./examples
        run: cargo +${{ matrix.rust }} fmt --all -- --check

  clippy:
    name: Run clippy - Rust (${{ matrix.rust }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: stable, os: ubuntu-22.04 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - name: Check with clippy
        run: cargo clippy --all

  clippy_wasm:
    name: Check default on Wasm (no features) - Rust (${{ matrix.rust }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: stable }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown
      - name: Check code
        run: cargo check --no-default-features --target wasm32-unknown-unknown

  examples:
    name: Build examples - Rust (${{ matrix.rust }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: stable, os: ubuntu-22.04 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - name: Check examples availability
        id: examples
        run: |
          if [ -f examples/Cargo.toml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "examples/Cargo.toml is not present; skipping examples job"
          fi
      - name: Check examples with clippy
        if: steps.examples.outputs.available == 'true'
        run: cargo clippy --all
        working-directory: ./examples
      - name: Build examples
        if: steps.examples.outputs.available == 'true'
        run: cargo build --workspace --verbose
        working-directory: ./examples
      - name: Clean examples
        if: steps.examples.outputs.available == 'true'
        run: cargo clean
        working-directory: ./examples

  autocorrect:
    name: AutoCorrect Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check source code
        uses: actions/checkout@v4

      - name: AutoCorrect
        uses: huacnlee/autocorrect-action@v2
        with:
          args: --lint --no-diff-bg-color docs/
