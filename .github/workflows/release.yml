name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - name: gqlrs-value
            registryName: gqlrs-value
            path: value
          - name: gqlrs-parser
            registryName: gqlrs-parser
            path: parser
          - name: gqlrs-derive
            registryName: gqlrs-derive
            path: derive
          - name: gqlrs
            registryName: gqlrs
            path: .
          - name: gqlrs-extras
            registryName: gqlrs-extras
            path: extras
          - name: gqlrs-actix-web
            registryName: gqlrs-actix-web
            path: integrations/actix-web
          - name: gqlrs-warp
            registryName: gqlrs-warp
            path: integrations/warp
          - name: gqlrs-poem
            registryName: gqlrs-poem
            path: integrations/poem
          - name: gqlrs-axum
            registryName: gqlrs-axum
            path: integrations/axum
          - name: gqlrs-rocket
            registryName: gqlrs-rocket
            path: integrations/rocket
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Checkout
        uses: actions/checkout@v4
      - name: get version
        working-directory: ${{ matrix.package.path }}
        run: echo PACKAGE_VERSION=$(sed -nE 's/^\s*version = "(.*?)"/\1/p' Cargo.toml) >> $GITHUB_ENV
      - name: check published version
        env:
          REGISTRY_NAME: ${{ matrix.package.registryName }}
        run: |
          PUBLISHED_VERSION=$(
            cargo search "$REGISTRY_NAME" --limit 10 --color never \
              | awk -v name="$REGISTRY_NAME" '$1 == name && $2 == "=" { gsub(/"/, "", $3); print $3; exit }'
          )
          echo "PUBLISHED_VERSION=$PUBLISHED_VERSION" >> "$GITHUB_ENV"
      - name: cargo login
        if: env.PACKAGE_VERSION != env.PUBLISHED_VERSION
        run: cargo login ${{ secrets.CRATES_TOKEN }}
      - name: cargo package
        if: env.PACKAGE_VERSION != env.PUBLISHED_VERSION
        working-directory: ${{ matrix.package.path }}
        run: |
          cargo package
          echo "We will publish:" $PACKAGE_VERSION
          echo "This is current latest:" $PUBLISHED_VERSION
      - name: Publish ${{ matrix.package.name }}
        if: env.PACKAGE_VERSION != env.PUBLISHED_VERSION
        working-directory: ${{ matrix.package.path }}
        run: |
          echo "# Cargo Publish"
          cargo publish --no-verify
      - name: Wait for crates.io index
        if: env.PACKAGE_VERSION != env.PUBLISHED_VERSION
        env:
          REGISTRY_NAME: ${{ matrix.package.registryName }}
        run: |
          for i in {1..30}; do
            PUBLISHED_VERSION=$(
              cargo search "$REGISTRY_NAME" --limit 10 --color never \
                | awk -v name="$REGISTRY_NAME" '$1 == name && $2 == "=" { gsub(/"/, "", $3); print $3; exit }'
            )
            if [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ]; then
              echo "$REGISTRY_NAME $PACKAGE_VERSION is available in the crates.io index."
              exit 0
            fi
            echo "Waiting for $REGISTRY_NAME $PACKAGE_VERSION in the crates.io index..."
            sleep 10
          done
          echo "$REGISTRY_NAME $PACKAGE_VERSION did not appear in the crates.io index in time." >&2
          exit 1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
